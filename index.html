<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Metro Rail Scheduler — Maharashtra Rail Services</title>
    <meta
      name="description"
      content="Mumbai Metro & Maharashtra Railway integrated operations portal. Real-time schedules, live train tracking, journey planner, and passenger information system."
    />
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:title" content="Metro Rail Scheduler" />
    <meta property="og:description" content="Mumbai Metro & Maharashtra Railway — integrated rail operations and passenger information system." />
    <meta property="og:type" content="website" />

    <!-- Maps powered by OpenStreetMap (free, no API key required) -->

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  </body>
</html>
